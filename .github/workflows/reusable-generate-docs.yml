name: Reusable DOCX-Derived Docs Generation

on:
  workflow_call:
    inputs:
      primary_markdown:
        description: Primary markdown file to convert
        required: true
        type: string
      artifact_base:
        description: Base output name without extension (defaults to markdown filename without .md)
        required: false
        default: ""
        type: string
      toc_depth:
        description: Table of contents depth
        required: false
        default: 3
        type: number
      commit_message:
        description: Commit message for generated outputs
        required: false
        default: "docs: regenerate PDF, Word, and EPUB documents [skip ci]"
        type: string
      commit_generated:
        description: Whether to commit generated outputs back to the caller repository
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: generate-docs-${{ github.repository }}
  cancel-in-progress: true

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          PANDOC_VER=3.6.3
          wget -q "https://github.com/jgm/pandoc/releases/download/${PANDOC_VER}/pandoc-${PANDOC_VER}-1-amd64.deb"
          sudo dpkg -i "pandoc-${PANDOC_VER}-1-amd64.deb"
          rm "pandoc-${PANDOC_VER}-1-amd64.deb"

      - name: Install LaTeX, fonts, and validators
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-extra \
            lmodern \
            fonts-noto-core \
            fonts-noto-extra \
            epubcheck \
            poppler-utils \
            unzip

      - name: Install eisvogel template
        run: |
          mkdir -p ~/.pandoc/templates
          TMPDIR_EIS=$(mktemp -d)
          curl -sL "https://github.com/Wandmalfarbe/pandoc-latex-template/releases/latest/download/Eisvogel.tar.gz" \
            | tar -xz -C "$TMPDIR_EIS"
          find "$TMPDIR_EIS" -name "*.latex" -exec cp {} ~/.pandoc/templates/ \;
          rm -rf "$TMPDIR_EIS"
          ls ~/.pandoc/templates/

      - name: Bootstrap pandoc styling assets
        run: |
          mkdir -p .github/pandoc

          if [ ! -f .github/pandoc/reference.docx ]; then
            pandoc --print-default-data-file reference.docx > .github/pandoc/reference.docx
            echo "Created default reference.docx — open in Word to customize styles and add page numbering (Insert > Page Number > Bottom of Page)."
          fi

          if [ ! -f .github/pandoc/pdf-defaults.yaml ]; then
            {
              printf '%s\n' '# Pandoc PDF defaults - eisvogel template, professional dark-header layout'
              printf '%s\n' 'variables:'
              printf '%s\n' '  # Fonts - Noto family has broad Unicode coverage (checkmarks, symbols, etc.)'
              printf '%s\n' '  mainfont: "Noto Serif"'
              printf '%s\n' '  sansfont: "Noto Sans"'
              printf '%s\n' '  monofont: "Noto Sans Mono"'
              printf '%s\n' '  fontsize: "11pt"'
              printf '%s\n' ''
              printf '%s\n' '  # Page layout'
              printf '%s\n' '  geometry: "margin=2.5cm, top=3cm, bottom=3cm"'
              printf '%s\n' '  linestretch: 1.2'
              printf '%s\n' ''
              printf '%s\n' '  # Title page - deep navy background with WordPress-blue rule'
              printf '%s\n' '  titlepage: true'
              printf '%s\n' '  titlepage-color: "1A1A2E"'
              printf '%s\n' '  titlepage-text-color: "FFFFFF"'
              printf '%s\n' '  titlepage-rule-color: "0073AA"'
              printf '%s\n' '  titlepage-rule-height: 6'
              printf '%s\n' ''
              printf '%s\n' '  # TOC on its own page'
              printf '%s\n' '  toc-own-page: true'
              printf '%s\n' ''
              printf '%s\n' '  # Hyperlinks - navy blue'
              printf '%s\n' '  colorlinks: true'
              printf '%s\n' '  linkcolor: "NavyBlue"'
              printf '%s\n' '  urlcolor: "NavyBlue"'
              printf '%s\n' '  citecolor: "NavyBlue"'
              printf '%s\n' ''
              printf '%s\n' '  # Tables - alternating row shading'
              printf '%s\n' '  table-use-row-colors: true'
              printf '%s\n' ''
              printf '%s\n' '  # Code - avoid breaking across pages'
              printf '%s\n' '  listings-no-page-break: true'
            } > .github/pandoc/pdf-defaults.yaml
            echo "Created default pdf-defaults.yaml (customize for PDF layout and typography)."
          fi

          if [ ! -f .github/pandoc/epub.css ]; then
            {
              printf '%s\n' ':root {'
              printf '%s\n' '  color-scheme: light;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'body {'
              printf '%s\n' '  max-width: 46em;'
              printf '%s\n' '  margin: 0 auto;'
              printf '%s\n' '  padding: 1.2em;'
              printf '%s\n' '  background: #fcfcfb;'
              printf '%s\n' '  color: #111827;'
              printf '%s\n' '  font-family: "Noto Serif", Georgia, serif;'
              printf '%s\n' '  line-height: 1.55;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'h1, h2, h3, h4 {'
              printf '%s\n' '  color: #0f172a;'
              printf '%s\n' '  font-family: "Noto Sans", "Helvetica Neue", Arial, sans-serif;'
              printf '%s\n' '  line-height: 1.2;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'h1 {'
              printf '%s\n' '  font-size: 1.9em;'
              printf '%s\n' '  border-bottom: 2px solid #e5e7eb;'
              printf '%s\n' '  padding-bottom: 0.3em;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'h2 {'
              printf '%s\n' '  font-size: 1.45em;'
              printf '%s\n' '  border-bottom: 1px solid #e5e7eb;'
              printf '%s\n' '  padding-bottom: 0.25em;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'a {'
              printf '%s\n' '  color: #0b5fff;'
              printf '%s\n' '  text-decoration: none;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'a:hover,'
              printf '%s\n' 'a:focus {'
              printf '%s\n' '  text-decoration: underline;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'code,'
              printf '%s\n' 'pre {'
              printf '%s\n' '  font-family: "Noto Sans Mono", "SFMono-Regular", Consolas, monospace;'
              printf '%s\n' '  font-size: 0.92em;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'pre {'
              printf '%s\n' '  padding: 0.9em;'
              printf '%s\n' '  overflow-x: auto;'
              printf '%s\n' '  border: 1px solid #e5e7eb;'
              printf '%s\n' '  border-radius: 6px;'
              printf '%s\n' '  background: #f3f4f6;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'blockquote {'
              printf '%s\n' '  margin: 1em 0;'
              printf '%s\n' '  padding: 0.1em 1em;'
              printf '%s\n' '  border-left: 4px solid #d1d5db;'
              printf '%s\n' '  background: #f9fafb;'
              printf '%s\n' '  color: #374151;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'table {'
              printf '%s\n' '  width: 100%;'
              printf '%s\n' '  border-collapse: collapse;'
              printf '%s\n' '  margin: 1.1em 0;'
              printf '%s\n' '  font-size: 0.94em;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'th,'
              printf '%s\n' 'td {'
              printf '%s\n' '  border: 1px solid #d1d5db;'
              printf '%s\n' '  padding: 0.45em 0.6em;'
              printf '%s\n' '  vertical-align: top;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'th {'
              printf '%s\n' '  background: #f3f4f6;'
              printf '%s\n' '  font-family: "Noto Sans", "Helvetica Neue", Arial, sans-serif;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'ul,'
              printf '%s\n' 'ol {'
              printf '%s\n' '  padding-left: 1.3em;'
              printf '%s\n' '}'
              printf '%s\n' ''
              printf '%s\n' 'img {'
              printf '%s\n' '  max-width: 100%;'
              printf '%s\n' '  height: auto;'
              printf '%s\n' '}'
            } > .github/pandoc/epub.css
            echo "Created default epub.css (customize for EPUB visual polish)."
          fi

      - name: Resolve build inputs
        id: inputs
        run: |
          md_file="${{ inputs.primary_markdown }}"
          if [ -n "${{ inputs.artifact_base }}" ]; then
            base="${{ inputs.artifact_base }}"
          else
            base="${md_file%.md}"
          fi
          echo "md_file=${md_file}" >> "$GITHUB_OUTPUT"
          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "docx_file=${base}.docx" >> "$GITHUB_OUTPUT"

      - name: Update date in frontmatter
        run: |
          md_file="${{ steps.inputs.outputs.md_file }}"
          today=$(date '+%B %-d, %Y')
          if head -1 "$md_file" | grep -q '^---$'; then
            sed -i "s/^date: .*/date: \"$today\"/" "$md_file"
            echo "Updated date -> $today in $md_file"
          fi

      - name: Convert primary document
        run: |
          md_file="${{ steps.inputs.outputs.md_file }}"
          base="${{ steps.inputs.outputs.base }}"
          docx_file="${{ steps.inputs.outputs.docx_file }}"
          toc_depth="${{ inputs.toc_depth }}"

          mkdir -p "$(dirname "$base")"

          version=$(sed -n '/^---$/,/^---$/{ s/^version: *"\{0,1\}\([^"]*\)"\{0,1\}/\1/p }' "$md_file")
          if [ -n "$version" ]; then
            display_date="Version ${version} — $(date '+%B %-d, %Y')"
          else
            display_date="$(date '+%B %-d, %Y')"
          fi

          echo "Converting $md_file (${display_date})"

          # 1) Markdown -> DOCX (intermediary template layer)
          pandoc "$md_file" \
            --reference-doc=".github/pandoc/reference.docx" \
            --toc --toc-depth="$toc_depth" \
            -o "$docx_file"
          echo "DOCX complete"

          # 2) DOCX -> PDF
          pandoc "$docx_file" \
            --from docx \
            --template eisvogel \
            --pdf-engine xelatex \
            --defaults ".github/pandoc/pdf-defaults.yaml" \
            --metadata "date=${display_date}" \
            --toc --toc-depth="$toc_depth" \
            -o "${base}.pdf"
          echo "PDF complete"

          # 3) DOCX -> EPUB
          pandoc "$docx_file" \
            --from docx \
            --css ".github/pandoc/epub.css" \
            --toc --toc-depth="$toc_depth" \
            --epub-title-page=false \
            --metadata "lang=en-US" \
            -o "${base}.epub"
          echo "EPUB complete"

      - name: Validate generated outputs
        run: |
          base="${{ steps.inputs.outputs.base }}"

          for artifact in "${base}.docx" "${base}.pdf" "${base}.epub"; do
            if [ ! -s "$artifact" ]; then
              echo "Missing or empty artifact: $artifact"
              exit 1
            fi
          done

          echo "Validating DOCX structure..."
          unzip -tqq "${base}.docx"

          echo "Running EPUB validation..."
          epubcheck "${base}.epub"

          echo "Running PDF validation..."
          pdfinfo_out=$(pdfinfo "${base}.pdf")
          echo "$pdfinfo_out"
          echo "$pdfinfo_out" | grep -Eq '^Pages:[[:space:]]+[1-9][0-9]*$'
          echo "$pdfinfo_out" | grep -Eq '^PDF version:[[:space:]]+[0-9.]+$'

      - name: Commit generated documents
        if: ${{ inputs.commit_generated }}
        run: |
          md_file="${{ steps.inputs.outputs.md_file }}"
          base="${{ steps.inputs.outputs.base }}"
          branch="${GITHUB_REF_NAME:-main}"

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add \
            "$md_file" \
            "${base}.pdf" \
            "${base}.docx" \
            "${base}.epub" \
            ".github/pandoc/reference.docx" \
            ".github/pandoc/pdf-defaults.yaml" \
            ".github/pandoc/epub.css" \
            2>/dev/null || true

          if ! git diff --staged --quiet; then
            git commit -m "${{ inputs.commit_message }}"
            git pull --rebase origin "$branch"
            git push
          else
            echo "No changes to commit"
          fi
